name: Collect Bangalore Commute Data

on:
  schedule:
    # 8:00 AM IST
    - cron: "30 2 * * *"

    # 12:00 PM IST
    - cron: "30 6 * * *"

    # 6:00 PM IST
    - cron: "30 12 * * *"

  workflow_dispatch:
    inputs:
      time_slot:
        description: "Time slot for manual testing"
        required: true
        type: choice
        options:
          - morning_peak
          - baseline
          - evening_peak

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Determine time slot
        id: slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.time_slot }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 2 * * *" ]; then
            echo "slot=morning_peak" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 6 * * *" ]; then
            echo "slot=baseline" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 12 * * *" ]; then
            echo "slot=evening_peak" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown workflow trigger."
            exit 1
          fi

      - name: Check collection date
        id: date_check
        shell: bash
        run: |
          TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          echo "Current IST date: $TODAY"

          if [[ "$TODAY" < "2026-07-23" || "$TODAY" > "2026-07-29" ]]; then
            echo "collect=false" >> "$GITHUB_OUTPUT"
            echo "Outside official 7-day collection window."
          else
            echo "collect=true" >> "$GITHUB_OUTPUT"
            echo "Inside official 7-day collection window."
          fi

      - name: Collect commute data
        if: steps.date_check.outputs.collect == 'true'
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          python python/collect_commute_data.py "${{ steps.slot.outputs.slot }}"

      - name: Commit collected data
        if: steps.date_check.outputs.collect == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/bangalore_commute_raw.csv

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: collect ${{ steps.slot.outputs.slot }} commute observations"
            git push
          fi